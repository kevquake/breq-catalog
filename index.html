<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Earthquakes | Breq Catalog</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; color: #333; }
        h2 { color: #0077b6; font-weight: normal; margin-bottom: 5px; }
        .info-box { border-left: 3px solid #ccc; padding-left: 10px; font-style: italic; font-size: 13px; margin-bottom: 20px; color: #666; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th { border-bottom: 2px solid #ddd; padding: 8px; font-weight: bold; color: #555; }
        td { padding: 8px; border-bottom: 1px solid #ddd; color: #0077b6; }
        
        /* Sistema Automático de Cores */
        .row-normal { background-color: #f9f9f9; }
        .row-blue { background-color: #e0f2fe; }
        .row-orange { background-color: #fbd38d; font-weight: bold; color: #b45309; }
        .region-text { text-align: left; color: #333; }
    </style>
</head>
<body>

    <h2>Latest Earthquakes</h2>
    <div class="info-box">
        Warning: Unless reviewed by a geophysicist, the earthquake locations herein presented may contain significant errors!
    </div>

    <table>
        <thead>
            <tr>
                <th>Origin Time</th>
                <th>Long.</th>
                <th>Lat.</th>
                <th>Dep.</th>
                <th>M</th>
                <th>Mag.</th>
                <th class="region-text">Region</th>
            </tr>
        </thead>
        <tbody id="eq-table-body">
            <!-- O JavaScript vai injetar as linhas dos sismos aqui dentro automaticamente -->
        </tbody>
    </table>

    <script>
        // Motor que busca o arquivo catalogo.json e desenha a tabela
        fetch('catalogo.json')
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('eq-table-body');
                tbody.innerHTML = ''; 

                data.forEach(eq => {
                    // Extrai apenas o número da magnitude para decidir a cor
                    let magNum = parseFloat(eq.mag_val.split(" ")[0]);
                    let rowClass = "row-normal";
                    
                    if (magNum >= 5.0) {
                        rowClass = "row-orange";
                    } else if (magNum >= 3.0) {
                        rowClass = "row-blue";
                    }

                    const tr = document.createElement('tr');
                    tr.className = rowClass;
                    tr.innerHTML = `
                        <td>${eq.time}</td>
                        <td>${eq.lon}</td>
                        <td>${eq.lat}</td>
                        <td>${eq.dep}</td>
                        <td>${eq.mag_type}</td>
                        <td>${eq.mag_val}</td>
                        <td class="region-text">${eq.region}</td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(error => {
                document.getElementById('eq-table-body').innerHTML = '<tr><td colspan="7">Aguardando dados sismológicos...</td></tr>';
            });
    </script>
</body>
</html>
